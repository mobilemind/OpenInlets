---
name: Tracking Parameter Monitor

"on":
  schedule:
    - cron: '0 0 1 * *'   # 1st of each month at midnight UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  check-params:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Fetch DuckDuckGo tracking parameters
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/duckduckgo/privacy-configuration/main/features/tracking-parameters.json" \
            -o /tmp/ddg-params.json

      - name: Extract and compare parameters
        id: compare
        run: |
          # Extract parameter names from DuckDuckGo JSON
          # DDG JSON has param as an array of objects w/ a "parameter" key
          # grep -v strips out common prefixes handled by UtmStrip
          jq -r '.settings.parameters[]' /tmp/ddg-params.json \
            | grep -Ev '^(action|fb|ga|hmb|hsa|mtm|pk|oly|utm)_' \
            | sort -u > /tmp/ddg-list.txt

          # Extract quoted strings from utmstrip.ts (single-quoted identifiers)
          # Matches 'param_name' patterns, strips quotes, excludes TypeScript types
          # grep -v strips out common prefixes handled by UtmStrip
          grep -oE "'[a-zA-Z_][a-zA-Z0-9_]*'" src/utmstrip.ts \
            | tr -d "'" | grep -Ev '^(action|fb|ga|hmb|hsa|mtm|pk|oly|utm)_' \
            | sort -u > /tmp/utmstrip-list.txt

          # Find params in DDG list not covered in utmstrip.ts
          comm -23 /tmp/ddg-list.txt /tmp/utmstrip-list.txt > /tmp/missing.txt

          if [ -s /tmp/missing.txt ]; then
            echo "new_params=true" >> "$GITHUB_OUTPUT"
            MISSING_PARAMS=$(cat /tmp/missing.txt)
            printf 'MISSING_PARAMS<<EOF\n%s\nEOF\n' "$MISSING_PARAMS" >> "$GITHUB_ENV"
          else
            echo "new_params=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open GitHub issue if new params found
        if: steps.compare.outputs.new_params == 'true'
        env:
          MISSING_PARAMS: ${{ env.MISSING_PARAMS }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Tracking params check: new parameters detected',
              labels: ['maintenance', 'utmstrip'],
              body: [
                '## Monthly Tracking Parameter Check',
                '',
                'The following parameters appear in DuckDuckGo\'s tracking',
                'protection list but are not present in `src/utmstrip.ts`:',
                '',
                '```',
                process.env.MISSING_PARAMS,
                '```',
                '',
                'Please review these against the quarterly maintenance checklist,',
                '`docs/Maintenance-Plan-UtmStrip.md` to decide to add them.',
              ].join('\n')
            });
