---
name: "Lint Code Base"

on:
  push:
    branches: [main, hotfix]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

# Prevent concurrent runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint Code Base"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: "Install Dependencies"
        run: npm ci --prefer-offline

      - name: "Run ESLint"
        run: npx eslint .

      - name: "Lint Markdown"
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#dist"

      - name: "Lint YAML"
        run: |
          pip install --quiet yamllint
          yamllint .

      - name: "Lint GitHub Actions"
        uses: rhysd/actionlint@v1

      - name: "Validate JSON"
        run: |
          find . -name '*.json' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './dist/*' \
            -print0 | xargs -0 -I{} node -e \
            "JSON.parse(require('fs').readFileSync('{}','utf8'))"

      - name: "Validate JSONC"
        run: |
          node -e "
            const fs = require('fs');
            const c = fs.readFileSync('.cspell.jsonc','utf8')
              .replace(/\/\/.*$/gm,'')
              .replace(/\/\*[\s\S]*?\*\//g,'')
              .replace(/,(\s*[}\]])/g,'\$1');
            JSON.parse(c);
            console.log('.cspell.jsonc: valid');
          "
